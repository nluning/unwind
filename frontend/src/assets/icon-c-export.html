<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Unwind icon · C · export</title>
<style>html,body{margin:0;padding:0;background:#ece6db}</style>
</head>
<body>
<div id="stage" style="display:inline-block"></div>
<script>
// Same generator + geometry as the canvas variant C, but rendered as a clean,
// full-bleed square SVG with NO shell, label, or shadow — ready to rasterize.

function mulberry32(seed) {
  return function() {
    let t = (seed += 0x6D2B79F5) | 0;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function buildCCWSpiralOnSurface({ cx, cy, startR, endR, turns, jitter, samples, seed, baselineY, rightX }) {
  const rng = mulberry32(seed);
  const totalAngle = turns * 2 * Math.PI;
  const endTheta = -Math.PI / 2;
  const startTheta = endTheta - totalAngle;
  const pts = [];
  for (let i = 0; i <= samples; i++) {
    const t = i / samples;
    const theta = startTheta + t * totalAngle;
    const r = startR + (endR - startR) * t;
    let x = cx + r * Math.cos(theta);
    let y = cy - r * Math.sin(theta);
    if (i > 2 && i < samples - 1) {
      const wob = (rng() - 0.5) * jitter * Math.min(1, t * 1.4);
      const nx = Math.cos(theta);
      const ny = -Math.sin(theta);
      x += nx * wob;
      y += ny * wob;
    }
    pts.push([x, y]);
  }
  pts[pts.length - 1] = [cx, baselineY];
  let d = `M ${pts[0][0].toFixed(2)} ${pts[0][1].toFixed(2)}`;
  let i = 1;
  for (; i < pts.length - 2; i += 2) {
    const c1 = pts[i], c2 = pts[i + 1], end = pts[i + 2];
    d += ` C ${c1[0].toFixed(2)} ${c1[1].toFixed(2)}, ${c2[0].toFixed(2)} ${c2[1].toFixed(2)}, ${end[0].toFixed(2)} ${end[1].toFixed(2)}`;
  }
  for (; i < pts.length; i++) d += ` L ${pts[i][0].toFixed(2)} ${pts[i][1].toFixed(2)}`;
  const midX = (cx + rightX) / 2;
  d += ` C ${midX.toFixed(2)} ${(baselineY + 0.4).toFixed(2)}, ${(rightX - 30).toFixed(2)} ${(baselineY - 0.3).toFixed(2)}, ${rightX.toFixed(2)} ${baselineY.toFixed(2)}`;
  return d;
}

const VB = 1024;
const BASELINE_Y = Math.round(VB * (196 / 240));   // 836
const BALL_R = Math.round(VB * (38 / 240));         // 162
const BALL_CX = Math.round(VB * (80 / 240));        // 341
const BALL_CY = BASELINE_Y - BALL_R;                // 674
const RIGHT_X = VB + Math.round(VB * (10 / 240));   // off the right edge

const path = buildCCWSpiralOnSurface({
  cx: BALL_CX, cy: BALL_CY,
  startR: BALL_R * (3.5 / 38),
  endR: BALL_R,
  turns: 3,
  jitter: BALL_R * (1.2 / 38),
  samples: 100,
  seed: 3,
  baselineY: BASELINE_Y,
  rightX: RIGHT_X,
});

// Stroke widths (proportional to viewBox so it stays crisp at any size)
const strokeW = Math.round(VB * (3.4 / 240));      // ≈ 14.5

const svg = `
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${VB} ${VB}" width="${VB}" height="${VB}">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#e4ecec"/>
      <stop offset="0.5" stop-color="#c9dbdc"/>
      <stop offset="1"   stop-color="#9fb9be"/>
    </linearGradient>
    <radialGradient id="sun" cx="${(BALL_CX/VB)*100}%" cy="${(BALL_CY/VB)*100}%" r="26%">
      <stop offset="0"   stop-color="#fbe7c4"/>
      <stop offset="0.6" stop-color="#f4d4a8" stop-opacity="0.85"/>
      <stop offset="1"   stop-color="#f4d4a8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="${VB}" height="${VB}" fill="url(#bg)"/>
  <circle cx="${BALL_CX}" cy="${BALL_CY}" r="${Math.round(BALL_R*1.32)}" fill="url(#sun)"/>
  <path d="${path}" fill="none" stroke="#3f6670" stroke-width="${strokeW}"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>`.trim();

document.getElementById('stage').innerHTML = svg;
window.__svgString = svg;
window.__VB = VB;
</script>
</body>
</html>
