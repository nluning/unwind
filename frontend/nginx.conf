server {
    listen 80;

    # Let's Encrypt ACME HTTP-01 challenge.
    # Must remain reachable over plain HTTP forever — renewals every 60 days
    # write a fresh token here, and Let's Encrypt fetches it via HTTP. After
    # we add HTTPS, port 80 redirects to 443 for everything *except* this path.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Serve the Vue app (static files from Vite build)
    location / {
        root /usr/share/nginx/html;
        index index.html;

        # Vue Router uses client-side routing — URLs like /chat or /stress
        # don't have matching files on disk. This tells nginx: if the file
        # doesn't exist, serve index.html and let Vue Router handle it.
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend container.
    # The browser calls /api/health, nginx strips the /api prefix
    # and forwards to http://backend:3000/health.
    location /api/ {
        proxy_pass http://backend:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSE streaming needs special treatment — nginx buffers responses by
    # default, which breaks streaming (the client waits for the full
    # response instead of receiving chunks). These directives disable that.
    location /api/chat/stream {
        proxy_pass http://backend:3000/chat/stream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering for SSE
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
    }
}
