# HTTP server: handles ACME challenges, redirects everything else to HTTPS.
# Port 80 has to stay reachable forever — Let's Encrypt cert renewals (every
# 60 days) re-run the HTTP-01 challenge against this exact path.
server {
    listen 80;
    server_name unwind.nu www.unwind.nu;

    # ACME HTTP-01 challenge — keep on plain HTTP for renewals.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else: redirect to HTTPS.
    # $host preserves the requested hostname so www.unwind.nu redirects to
    # https://www.unwind.nu (not collapsed to a single canonical name).
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server: the actual application.
server {
    listen 443 ssl;
    http2 on;
    server_name unwind.nu www.unwind.nu;

    # Certificates issued by certbot, mounted from the host as a read-only volume.
    # fullchain.pem includes our cert + Let's Encrypt's intermediate cert, in the
    # order browsers need to verify the chain back to a trusted root.
    ssl_certificate /etc/letsencrypt/live/unwind.nu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/unwind.nu/privkey.pem;

    # Disable old broken TLS versions. TLSv1.0 and TLSv1.1 have known weaknesses
    # and modern browsers warn about them. TLSv1.2 is the floor; TLSv1.3 is the
    # current best.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    # Serve the Vue app (static files from Vite build).
    # try_files: if the requested path doesn't match a file, fall back to
    # index.html so Vue Router handles the route client-side.
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend container.
    # The browser calls /api/health, nginx strips the /api prefix
    # and forwards to http://backend:3000/health.
    # X-Forwarded-Proto: https tells Fastify (with trustProxy) the original
    # request was HTTPS, so secure cookies and req.protocol work correctly.
    location /api/ {
        proxy_pass http://backend:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSE streaming needs buffering disabled — nginx buffers proxied responses
    # by default, which breaks streaming (the client waits for the full
    # response instead of receiving chunks).
    location /api/chat/stream {
        proxy_pass http://backend:3000/chat/stream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
    }
}
