# Rate-limit zone for the login endpoint. Keyed on $binary_remote_addr (the
# real TCP client IP) — not $http_x_forwarded_for, which is user-controllable
# and would let an attacker bypass the limit by spoofing a random IP per
# request. 10m holds roughly 160k unique IPs in shared memory.
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# HTTP server: handles ACME challenges, redirects everything else to HTTPS apex.
# Port 80 has to stay reachable forever — Let's Encrypt cert renewals (every
# 60 days) re-run the HTTP-01 challenge against this exact path.
server {
    listen 80;
    server_name unwind.nu www.unwind.nu;

    # ACME HTTP-01 challenge — keep on plain HTTP for renewals.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else: redirect straight to the HTTPS apex. We collapse www
    # into the apex here (instead of preserving $host) so users canonicalize
    # to a single origin — see the www HTTPS block below for why.
    location / {
        return 301 https://unwind.nu$request_uri;
    }
}

# HTTPS www → apex redirect. The SPA is built with VITE_API_URL=https://unwind.nu/api
# baked in, so loading it from www.unwind.nu makes every API call cross-origin —
# CORS rejects them and Safari blocks the cookies as third-party. Canonicalizing
# to the apex here means users only ever load the SPA from one origin.
server {
    listen 443 ssl;
    http2 on;
    server_name www.unwind.nu;

    ssl_certificate /etc/letsencrypt/live/unwind.nu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/unwind.nu/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    return 301 https://unwind.nu$request_uri;
}

# HTTPS server: the actual application.
server {
    listen 443 ssl;
    http2 on;
    server_name unwind.nu;

    # Certificates issued by certbot, mounted from the host as a read-only volume.
    # fullchain.pem includes our cert + Let's Encrypt's intermediate cert, in the
    # order browsers need to verify the chain back to a trusted root.
    ssl_certificate /etc/letsencrypt/live/unwind.nu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/unwind.nu/privkey.pem;

    # Disable old broken TLS versions. TLSv1.0 and TLSv1.1 have known weaknesses
    # and modern browsers warn about them. TLSv1.2 is the floor; TLSv1.3 is the
    # current best.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    # Serve the Vue app (static files from Vite build).
    # try_files: if the requested path doesn't match a file, fall back to
    # index.html so Vue Router handles the route client-side.
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Login endpoint — exact-match preempts the /api/ prefix block below.
    # burst=10 nodelay: a real user fat-fingering or a password-manager retry
    # storm gets 10 immediate attempts; beyond that, sustained 5/min per IP.
    # That's 7200/day max — well below brute-force threshold against argon2id,
    # and slow enough that credential-stuffing leaves an obvious log trail.
    location = /api/auth/login {
        limit_req zone=login burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:3000/auth/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy API requests to the backend container.
    # The browser calls /api/health, nginx strips the /api prefix
    # and forwards to http://backend:3000/health.
    # X-Forwarded-Proto: https tells Fastify (with trustProxy) the original
    # request was HTTPS, so secure cookies and req.protocol work correctly.
    location /api/ {
        proxy_pass http://backend:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Sentry tunnel — bypasses browser ad blockers (uBlock, Brave shields,
    # Firefox ETP) that silently drop requests to *.sentry.io. The SDK posts
    # the envelope to /sentry-tunnel on our origin; nginx forwards it to
    # Sentry server-side, where blockers can't see the destination.
    location = /sentry-tunnel {
        if ($request_method != POST) {
            return 405;
        }
        # Sentry's ingest is multi-tenant, so SNI + Host header are what route
        # the envelope to the right org. Hardcoded to unwind-frontend's project.
        proxy_pass https://o4511348432830464.ingest.de.sentry.io/api/4511348616396880/envelope/;
        proxy_set_header Host o4511348432830464.ingest.de.sentry.io;
        proxy_ssl_server_name on;
    }

    # SSE streaming needs buffering disabled — nginx buffers proxied responses
    # by default, which breaks streaming (the client waits for the full
    # response instead of receiving chunks).
    location /api/chat/stream {
        proxy_pass http://backend:3000/chat/stream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
    }
}
