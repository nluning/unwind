name: deploy

on:
  push:
    # `development` is here temporarily so we can iterate on this workflow
    # without merging to main. Remove it before the final main-merge in step 8.
    branches: [main, development]
  workflow_dispatch:

jobs:
  build-and-push:
    name: build & push images to GHCR
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # required to push to ghcr.io

    steps:
      - uses: actions/checkout@v4

      # GHCR image namespaces must be lowercase; GitHub usernames may be mixed case.
      # Lowercase the owner once and reuse via steps.ns.outputs.value.
      - name: Compute lowercase image namespace
        id: ns
        run: echo "value=${REPO_OWNER,,}" >> "$GITHUB_OUTPUT"
        env:
          REPO_OWNER: ${{ github.repository_owner }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ steps.ns.outputs.value }}/unwind-backend:sha-${{ github.sha }}
            ghcr.io/${{ steps.ns.outputs.value }}/unwind-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ steps.ns.outputs.value }}/unwind-frontend:sha-${{ github.sha }}
            ghcr.io/${{ steps.ns.outputs.value }}/unwind-frontend:latest
          build-args: |
            VITE_API_URL=https://unwind.nu/api
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: deploy to production
    runs-on: ubuntu-latest
    needs: build-and-push
    # Only deploy from main. Dev pushes build images (warming caches, catching
    # build breaks early) but skip the deploy.
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Provision SSH key and known_hosts on the runner
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy
          chmod 600 ~/.ssh/deploy
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh -i ~/.ssh/deploy "${SSH_USER}@${SSH_HOST}" "IMAGE_TAG=sha-${GITHUB_SHA} bash -s" <<'REMOTE'
          set -euo pipefail
          echo "==> Deploying $IMAGE_TAG to production"
          cd ~/unwind
          echo "==> Pulling latest compose file"
          git fetch origin main
          git checkout main
          git pull --ff-only origin main
          echo "==> Pulling new images from GHCR"
          docker compose -f docker-compose.production.yml pull
          echo "==> Running migrations"
          docker compose -f docker-compose.production.yml run --rm backend node dist/db/migrate.js
          echo "==> Restarting containers"
          docker compose -f docker-compose.production.yml up -d --remove-orphans
          echo "==> Pruning dangling images"
          docker image prune -f
          echo "==> Deploy complete"
          REMOTE
