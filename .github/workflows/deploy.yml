name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    name: build & push images to GHCR
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # required to push to ghcr.io

    steps:
      - uses: actions/checkout@v4

      # GHCR image namespaces must be lowercase; GitHub usernames may be mixed case.
      # Lowercase the owner once and reuse via steps.ns.outputs.value.
      - name: Compute lowercase image namespace
        id: ns
        run: echo "value=${REPO_OWNER,,}" >> "$GITHUB_OUTPUT"
        env:
          REPO_OWNER: ${{ github.repository_owner }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ steps.ns.outputs.value }}/unwind-backend:sha-${{ github.sha }}
            ghcr.io/${{ steps.ns.outputs.value }}/unwind-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ steps.ns.outputs.value }}/unwind-frontend:sha-${{ github.sha }}
            ghcr.io/${{ steps.ns.outputs.value }}/unwind-frontend:latest
          build-args: |
            VITE_API_URL=https://unwind.nu/api
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
