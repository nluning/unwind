services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # No "ports:" — the database is only reachable by other containers
    # on this Docker network, not from the outside world.

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      FRONTEND_URL: ${FRONTEND_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      NODE_ENV: production
    # No "ports:" — only the frontend (nginx) container talks to the backend.
    # Outside traffic goes through nginx, never directly to port 3000.

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${FRONTEND_URL}/api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/www/certbot:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    # Ports 80 and 443 exposed to the outside world.
    # /var/www/certbot — webroot for Let's Encrypt HTTP-01 challenges
    # /etc/letsencrypt — issued certificates from certbot on the host
    # Both mounted read-only — nginx never needs to write to them.

volumes:
  pgdata:
