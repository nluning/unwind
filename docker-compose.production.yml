services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # No "ports:" — the database is only reachable by other containers
    # on this Docker network, not from the outside world.

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      FRONTEND_URL: ${FRONTEND_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      NODE_ENV: production
    # No "ports:" — only the frontend (nginx) container talks to the backend.
    # Outside traffic goes through nginx, never directly to port 3000.

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${FRONTEND_URL}/api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    # Port 80 is the only port exposed to the outside world.
    # nginx handles everything: static files + API proxy.

volumes:
  pgdata:
